<div class="h-screen flex flex-col">
    <div class="bg-linear-to-r from-blue-600 to-blue-700 text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold flex items-center gap-2">
                    <span class="text-3xl">🌤️</span>
                    Ramalan Cuaca Malaysia
                </h1>
                <p class="text-sm text-blue-100">Kemaskini cuaca terkini di seluruh Malaysia</p>
            </div>
            <div class="text-sm bg-blue-800 px-3 py-1 rounded-full">
                {{ todayLabel }}
            </div>
        </div>
    </div>

    <div class="flex-1 flex flex-col lg:flex-row overflow-hidden">
        <app-map-sidebar
            [selectedForecast]="selectedForecast"
            [uniqueDates]="uniqueDates"
            [locations]="getLocationsWithForecast()"
            [forecasts]="forecasts"
            [filteredDate]="filteredDate"
            [selectedLocationType]="selectedLocationType"
            [locationTypes]="locationTypes"
            (onDateFilter)="onDateFilter($event)"
            (onLocationTypeFilter)="onLocationTypeFilter($event)"
            (onResetFilter)="onResetFilter()"
            (onLocationSelect)="onLocationSelect($event)">
        </app-map-sidebar>

        <div class="flex-1 relative">
            <div id="map" class="w-full h-full"></div>
            <button (click)="centerOnUserLocation()"
                class="absolute bottom-4 left-4 bg-white p-2 rounded-full shadow-lg z-10 hover:bg-gray-100 transition"
                title="Pusatkan lokasi saya">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
            </button>

            <app-map-legend></app-map-legend>

            <div *ngIf="mapError" class="absolute inset-0 bg-white bg-opacity-75 flex items-center justify-center z-20">
                <div class="text-center p-6 bg-white rounded-lg shadow-xl">
                    <p class="text-red-600 mb-4">Ralat memuatkan peta</p>
                    <button (click)="retryLoadMap()"
                        class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
                        Cuba Semula
                    </button>
                </div>
            </div>

            <div *ngIf="!forecasts.length && !mapError"
                class="absolute inset-0 bg-white bg-opacity-75 flex items-center justify-center z-20">
                <div class="text-center">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto"></div>
                    <p class="mt-4 text-gray-600">Memuatkan data cuaca...</p>
                </div>
            </div>
        </div>
    </div>
</div>
