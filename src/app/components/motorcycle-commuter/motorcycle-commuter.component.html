<div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 mb-4 h-full">
    <!-- Header -->
    <div class="flex items-center gap-3 mb-6">
        <span class="text-2xl">🏍️</span>
        <h3 class="font-semibold text-gray-900">Pengguna Jalan Raya</h3>
    </div>

    <!-- Location Grid -->
    <div class="grid grid-cols-2 gap-6 mb-6">
        <!-- Home Location -->
        <div class="space-y-2">
            <label class="flex items-center gap-2 text-sm font-medium text-gray-600">
                <span class="text-lg">🏠</span>
                Lokasi Rumah
            </label>
            <div class="relative">
                <input #homeSearchInput type="text" [(ngModel)]="homeLocation" (ngModelChange)="onLocationChange()"
                    placeholder="Cari alamat rumah..." class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm
                           focus:bg-white focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 
                           transition-all duration-200">
            </div>
        </div>

        <!-- Work Location -->
        <div class="space-y-2">
            <label class="flex items-center gap-2 text-sm font-medium text-gray-600">
                <span class="text-lg">🏢</span>
                Lokasi Kerja
            </label>
            <div class="relative">
                <input #workSearchInput type="text" [(ngModel)]="workLocation" (ngModelChange)="onLocationChange()"
                    placeholder="Cari alamat kerja..." class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm
                           focus:bg-white focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500
                           transition-all duration-200">
            </div>
        </div>
    </div>

    <!-- Journey Times Section -->
    <div class="mb-6 p-5 bg-gray-50 rounded-xl border border-gray-100">
        <h4 class="flex items-center gap-2 text-sm font-medium text-gray-700 mb-4">
            <span class="text-lg">⏱️</span>
            Masa Perjalanan
            <span class="text-xs font-normal text-gray-400 ml-auto">Sama untuk semua hari</span>
        </h4>

        <div class="grid grid-cols-2 gap-6">
            <!-- Home to Work -->
            <div class="space-y-3">
                <label class="flex items-center gap-2 text-xs font-medium text-gray-500">
                    <span class="text-blue-500">🏠 → 🏢</span>
                    Bertolak ke Kerja
                </label>
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <span class="text-xs text-gray-400">Bertolak</span>
                        <select [(ngModel)]="homeToWork.departure" (ngModelChange)="onFormChange()" class="w-full px-3 py-2 bg-white border border-gray-200 rounded-lg text-sm
                                   focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500
                                   transition-all duration-200 cursor-pointer">
                            <option *ngFor="let time of timeSlots" [value]="time">{{time}}</option>
                        </select>
                    </div>
                    <div class="space-y-1">
                        <span class="text-xs text-gray-400">Sampai</span>
                        <select [(ngModel)]="homeToWork.arrival" (ngModelChange)="onFormChange()" class="w-full px-3 py-2 bg-white border border-gray-200 rounded-lg text-sm
                                   focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500
                                   transition-all duration-200 cursor-pointer">
                            <option *ngFor="let time of timeSlots" [value]="time">{{time}}</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Work to Home -->
            <div class="space-y-3">
                <label class="flex items-center gap-2 text-xs font-medium text-gray-500">
                    <span class="text-blue-500">🏢 → 🏠</span>
                    Bertolak Balik
                </label>
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <span class="text-xs text-gray-400">Bertolak</span>
                        <select [(ngModel)]="workToHome.departure" (ngModelChange)="onFormChange()" class="w-full px-3 py-2 bg-white border border-gray-200 rounded-lg text-sm
                                   focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500
                                   transition-all duration-200 cursor-pointer">
                            <option *ngFor="let time of timeSlots" [value]="time">{{time}}</option>
                        </select>
                    </div>
                    <div class="space-y-1">
                        <span class="text-xs text-gray-400">Sampai</span>
                        <select [(ngModel)]="workToHome.arrival" (ngModelChange)="onFormChange()" class="w-full px-3 py-2 bg-white border border-gray-200 rounded-lg text-sm
                                   focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500
                                   transition-all duration-200 cursor-pointer">
                            <option *ngFor="let time of timeSlots" [value]="time">{{time}}</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <!-- Duration Info -->
        <div *ngIf="selectedHomeLocation && selectedWorkLocation"
            class="mt-4 flex items-center gap-2 text-xs text-gray-500">
            <div class="flex items-center gap-1.5">
                <span class="w-1.5 h-1.5 bg-green-500 rounded-full"></span>
                <span>Anggaran masa perjalanan:</span>
                <span class="font-medium text-gray-700">{{journeyDuration}}</span>
            </div>
        </div>
    </div>

    <!-- Working Days Selection - Minimalist Cards -->
    <div class="mb-6">
        <label class="flex items-center gap-2 text-sm font-medium text-gray-600 mb-3">
            <span class="text-lg">📅</span>
            Hari Bekerja
        </label>

        <div class="grid grid-cols-4 gap-2">
            <div *ngFor="let day of weekDays" (click)="day.isWorking = !day.isWorking; onFormChange()"
                class="group relative cursor-pointer transition-all duration-200">

                <!-- Card -->
                <div class="relative p-3 rounded-xl border-2 transition-all duration-200
                          hover:shadow-md" [ngClass]="{
                       'border-blue-500 bg-blue-50': day.isWorking,
                       'border-gray-100 bg-white hover:border-gray-200': !day.isWorking
                     }">

                    <!-- Day Name - Full on desktop, short on mobile -->
                    <div class="text-center">
                        <div class="text-sm font-medium mb-1 hidden sm:block"
                            [ngClass]="{'text-blue-700': day.isWorking, 'text-gray-600': !day.isWorking}">
                            {{day.label}}
                        </div>
                        <div class="text-sm font-medium mb-1 sm:hidden"
                            [ngClass]="{'text-blue-700': day.isWorking, 'text-gray-600': !day.isWorking}">
                            {{day.label.substring(0, 3)}}
                        </div>

                        <!-- Status Indicator -->
                        <div class="flex justify-center">
                            <div class="w-5 h-5 rounded-full flex items-center justify-center
                                        transition-all duration-200" [ngClass]="{
                                   'bg-blue-500 text-white': day.isWorking,
                                   'bg-gray-100 text-gray-400 group-hover:bg-gray-200': !day.isWorking
                                 }">
                                <span class="text-xs">
                                    {{day.isWorking ? '✓' : ''}}
                                </span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Summary Badge -->
        <div class="flex items-center justify-end mt-2">
            <div class="text-xs text-gray-400">
                {{getWorkingDaysCount()}} hari bekerja dipilih
            </div>
        </div>
    </div>

    <!-- Calculate Button -->
    <button (click)="onCalculate()" [disabled]="!isFormValid()" class="w-full bg-gradient-to-r from-blue-600 to-blue-700 text-white py-3.5 px-4 
                   rounded-xl font-medium text-sm tracking-wide
                   hover:from-blue-700 hover:to-blue-800 
                   focus:ring-4 focus:ring-blue-500/20 
                   transition-all duration-200 
                   disabled:opacity-40 disabled:cursor-not-allowed disabled:hover:from-blue-600
                   flex items-center justify-center gap-2">
        <span class="text-lg">🗺️</span>
        Kira Laluan & Kebarangkalian Hujan
    </button>
</div>
